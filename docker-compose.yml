services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ids-local-dev
      MYSQL_DATABASE: DB_ProyectoFinal_IDS
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/database/database_finalIDS.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pids-local-dev"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: DB_ProyectoFinal_IDS
      DB_USER: root
      DB_PASSWORD: ids-local-dev
      PORT: "5000"
      FRONTEND_URL: http://localhost:5001
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      BACKEND_URL: http://backend:5000
      PORT: "5001"
      SECRET_KEY: dev-frontend-secret
    ports:
      - "5001:5001"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

volumes:
  db_data: