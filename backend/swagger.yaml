          description: >
            Hash SHA-256 generado a partir de `{id_alumno}-{id_clase}-2026-secret`.
            Se obtiene escaneando el QR enviado por email al alumno.
          example: "a3f1c2d4e5..."
        latitud:
          type: number
          format: float
          description: Latitud GPS del alumno al momento de registrar asistencia
          example: -34.6177
        longitud:
          type: number
          format: float
          description: Longitud GPS del alumno al momento de registrar asistencia
          example: -58.3682
        presente:
          type: boolean
          default: true
          example: true

    Class:
      type: object
      properties:
