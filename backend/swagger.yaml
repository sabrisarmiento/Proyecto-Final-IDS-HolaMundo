      scheme: bearer
      bearerFormat: JWT

  schemas:

    Advertisement:
      type: object
      properties:
        id_aviso:
          type: integer
          example: 1
        id_usuario:
          type: integer
          example: 10
        id_curso:
          type: integer
          example: 3
        titulo:
          type: string
          example: Recordatorio de examen
        mensaje:
          type: string
          example: El examen parcial es el viernes a las 18hs.
        fecha:
          type: string
          format: date
          example: "2026-06-10"
        emisor:
          type: string
          example: Juan Pérez

    AdvertisementCreate:
      type: object
      required:
        - id_curso
        - titulo
        - mensaje
      description: El `id_usuario` se obtiene automáticamente del token JWT, no hace falta enviarlo.
      properties:
        id_curso:
          type: integer
          example: 3
        titulo:
          type: string
          example: Recordatorio de examen
        mensaje:
          type: string
          example: El examen parcial es el viernes a las 18hs.

    AdvertisementPatch:
      type: object
      description: Al menos un campo debe estar presente.
      properties:
        id_usuario:
          type: integer
          example: 10
        titulo:
          type: string
          example: Nuevo título
        mensaje:
          type: string
          example: Mensaje actualizado.
        fecha:
          type: string
          format: date
          example: "2026-06-15"

    Attendance:
      type: object
      properties:
        id_asistencia:
          type: integer
          example: 42
        id_alumno:
          type: integer
          example: 7
        id_clase:
          type: integer
          example: 5
        presente:
          type: boolean
          example: true

    AttendanceCreate:
      type: object
      required:
