# ROLES

  /roles:
    get:
      tags:
        - Roles
      summary: Obtener roles
      description: >
        Retorna todos los roles. Se puede filtrar por `id_roles`, `name` (nombre) o `admin_level`
        (nivel de administración, entre 1 y 3). Si no hay resultados devuelve 204 sin cuerpo.
      parameters:
        - in: query
          name: id_roles
          schema:
            type: integer
          description: ID del rol (debe ser > 0)
        - in: query
          name: name
          schema:
            type: string
          description: Nombre del rol
        - in: query
          name: admin_level
          schema:
            type: integer
            minimum: 1
            maximum: 3
          description: Nivel de administración (1, 2 o 3)
      responses:
        "200":
          description: Lista de roles obtenida correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      roles encontrados:
                        type: array
                        items:
                          $ref: "#/components/schemas/Role"
        "204":
          description: No se encontraron roles con los filtros indicados
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Roles
      summary: Crear un rol
      description: >
        Crea un nuevo rol. El campo `nivel_administracion` debe ser un entero entre 1 y 3.
        Si ya existe un rol con el mismo nombre y nivel devuelve 409. Requiere autenticación.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleCreate"
      responses:
        "201":
          description: Rol creado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: El rol ha sido creado exitosamente
                      id:
                        type: integer
                        example: 4
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /roles/{id}:
    delete:
      tags:
        - Roles
      summary: Eliminar un rol
      description: >
        Elimina un rol por su ID. Devuelve 204 sin cuerpo si se elimina correctamente.
        Requiere autenticación.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID del rol a eliminar (debe ser > 0)
      responses:
        "204":
          description: Rol eliminado correctamente (sin cuerpo)
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

# ALUMNOS

  /students:
    get:
      tags:
        - Students
      summary: Obtener alumnos
      description: >
        Retorna alumnos con paginación y filtros opcionales. Soporta ordenamiento
        mediante `order_by` y `order`. Si no hay resultados devuelve 204.
        Requiere autenticación.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Número de página (default 1)
        - in: query
          name: per_page
          schema:
            type: integer
            default: 10
          description: Cantidad de resultados por página (default 10)
        - in: query
          name: nombre
          schema:
            type: string
          description: Filtrar por nombre exacto
        - in: query
          name: apellido
          schema:
            type: string
          description: Filtrar por apellido exacto
        - in: query
          name: mail
          schema:
            type: string
          description: Filtrar por correo exacto
        - in: query
          name: id_curso
          schema:
            type: integer
          description: Filtrar por ID de curso
        - in: query
          name: order_by
          schema:
            type: string
          description: Campo por el cual ordenar (ej. `apellido`, `nombre`)
        - in: query
          name: order
          schema:
            type: string
            enum: [asc, desc]
          description: Dirección del ordenamiento
      responses:
        "200":
          description: Lista de alumnos obtenida correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      students:
                        type: array
                        items:
                          $ref: "#/components/schemas/Student"
                      total:
                        type: integer
                        description: Total de registros que coinciden con los filtros (sin paginación)
                        example: 87
        "204":
          description: No se encontraron alumnos con los filtros indicados
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Students
      summary: Crear un alumno
      description: >
        Crea un nuevo alumno. Devuelve 409 si ya existe un alumno con el mismo
        correo o padrón. Requiere autenticación.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentCreate"
      responses:
        "201":
          description: Alumno creado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Alumno creado correctamente
                      id:
                        type: integer
                        example: 42
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /students/import:
    post:
      tags:
        - Students
      summary: Importar alumnos desde CSV
      description: >
        Importa alumnos en lote desde un archivo `.csv` enviado como `multipart/form-data`
        en el campo `file`. El CSV debe incluir los campos requeridos de cada alumno más
        `id_rol` (entero).


        El status de respuesta varía según el resultado:
        - `201` si todos los alumnos se crearon correctamente.
        - `207 Multi-Status` si hubo creaciones y también errores.
        - `400` si no se creó ninguno.


        Requiere autenticación.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Archivo CSV con los datos de los alumnos
      responses:
        "201":
          description: Todos los alumnos importados correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"
        "207":
          description: Importación parcial — algunos alumnos se crearon y otros fallaron
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /students/{id}:
    get:
      tags:
        - Students
      summary: Obtener un alumno por ID
      description: Requiere autenticación.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID del alumno (debe ser > 0)
      responses:
        "200":
          description: Alumno encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      student:
                        type: array
                        items:
                          $ref: "#/components/schemas/Student"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

