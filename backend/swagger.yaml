openapi: 3.0.3
info:
  title: Course Administration API
  description: API para la administración de cursos universitarios
  version: 1.0.0

tags:
  - name: Advertisements
    description: Gestión de avisos de cursos
  - name: Attendance
    description: Gestión de asistencia a clases
  - name: Classes
    description: Gestión de clases dentro de un curso
  - name: Courses
    description: Gestión de cursos universitarios
  - name: Exams
    description: Gestión de evaluaciones y notas
  - name: ExamTypes
    description: Gestión de tipos de evaluación
  - name: Marks
    description: Gestión de notas individuales
  - name: Materials
    description: Gestión de materiales de estudio de un curso
  - name: Roles
    description: Gestión de roles de usuario
  - name: Students
    description: Gestión de alumnos
  - name: Subjects
    description: Gestión de materias
  - name: Teams
    description: Gestión de equipos de alumnos
  - name: TeamStudents
    description: Gestión de alumnos dentro de equipos
  - name: Users
    description: Gestión de usuarios del sistema
  - name: Dashboard
    description: Dashboards de métricas y gestión centralizada
  - name: Reports
    description: Generación de reportes en PDF

paths:

# AVISOS

  /advertisements:
    get:
      tags:
        - Advertisements
      summary: Obtener todos los avisos
      description: Retorna una lista de avisos. Se pueden filtrar por usuario, curso, título o fecha.
      parameters:
        - in: query
          name: id_usuario
          schema:
            type: integer
          description: ID del usuario emisor del aviso
        - in: query
          name: id_curso
          schema:
            type: integer
          description: ID del curso asociado al aviso
        - in: query
          name: titulo
          schema:
            type: string
          description: Título exacto del aviso
        - in: query
          name: fecha
          schema:
            type: string
            format: date
          description: Fecha del aviso (YYYY-MM-DD)
      responses:
        "200":
          description: Lista de avisos obtenida correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      advertisements:
                        type: array
                        items:
                          $ref: "#/components/schemas/Advertisement"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Advertisements
      summary: Crear un nuevo aviso
      description: >
        Crea un aviso nuevo. El usuario se extrae del token JWT.
        Valida que el usuario pertenezca al curso antes de crear el aviso.
        También envía el aviso al canal de Slack del curso automáticamente.
        Requiere autenticación.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvertisementCreate"
      responses:
        "201":
          description: Aviso creado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: aviso creado correctamente
                      slack:
                        type: object
                        description: Resultado del envío al canal de Slack del curso
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /advertisements/slack:
    get:
      tags:
        - Advertisements
      summary: Obtener avisos para Slack
      description: Retorna los avisos formateados para ser enviados por Slack.
      responses:
        "200":
          description: Avisos para Slack obtenidos correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        "500":
          $ref: "#/components/responses/InternalServerError"

  /advertisements/subject/{id_materia}:
    get:
      tags:
        - Advertisements
      summary: Obtener avisos por materia
      description: >
        Retorna todos los avisos de todos los cursos que pertenecen a una materia,
        ordenados por fecha descendente.
      parameters:
        - in: path
          name: id_materia
          required: true
          schema:
            type: integer
          description: ID de la materia
      responses:
        "200":
          description: Avisos de la materia obtenidos correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      advertisements:
                        type: array
                        items:
                          $ref: "#/components/schemas/Advertisement"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /advertisements/{id_advertisement}:
    get:
      tags:
        - Advertisements
      summary: Obtener un aviso por ID
      description: Retorna los datos de un aviso específico.
      parameters:
        - in: path
          name: id_advertisement
          required: true
          schema:
            type: integer
          description: ID del aviso
      responses:
        "200":
          description: Aviso encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      advertisement:
                        $ref: "#/components/schemas/Advertisement"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      tags:
        - Advertisements
      summary: Actualizar parcialmente un aviso
      description: Actualiza uno o más campos de un aviso existente. Requiere autenticación.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id_advertisement
          required: true
          schema:
            type: integer
          description: ID del aviso a actualizar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvertisementPatch"
      responses:
        "200":
          description: Aviso actualizado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: aviso actualizado correctamente
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags:
        - Advertisements
      summary: Eliminar un aviso
      description: Elimina un aviso por su ID. Requiere autenticación.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id_advertisement
          required: true
          schema:
            type: integer
          description: ID del aviso a eliminar
      responses:
        "200":
          description: Aviso eliminado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Aviso con ID 1 eliminado correctamente
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

# ASISTENCIA

  /asistencia:
    get:
      tags:
        - Attendance
      summary: Obtener registros de asistencia
      description: Retorna registros de asistencia. Se puede filtrar por clase o por alumno.
      parameters:
        - in: query
          name: id_clase
          schema:
            type: integer
          description: ID de la clase para filtrar asistencia
        - in: query
          name: id_alumno
          schema:
            type: integer
          description: ID del alumno para filtrar asistencia
      responses:
        "200":
          description: Registros de asistencia obtenidos correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      attendance:
                        type: array
                        items:
                          $ref: "#/components/schemas/Attendance"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Attendance
      summary: Registrar asistencia
      description: >
        Registra la asistencia de un alumno a una clase.
        Valida el código QR (`code`) generado con SHA-256 a partir del `id_alumno`, `id_clase` y un secreto interno.
        También valida que el alumno esté activo y que su ubicación GPS esté dentro del radio permitido (300 m de FIUBA).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceCreate"
      responses:
        "201":
          description: Asistencia registrada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Asistencia registrada correctamente
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /asistencia/generar-qr:
    post:
      tags:
        - Attendance
      summary: Generar y enviar QRs de asistencia
      description: >
        Genera códigos QR únicos para cada alumno activo de una clase y los envía por correo electrónico.
        Cada QR contiene un hash SHA-256 vinculado al alumno y a la clase.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id_clase
              properties:
                id_clase:
                  type: integer
                  description: ID de la clase para la cual se generan los QRs
                  example: 5
      responses:
        "200":
          description: QRs generados y enviados correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: QRs generados y enviados a 30 alumnos correctamente
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: No se encontraron alumnos activos para la clase indicada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /asistencia/{id}:
    patch:
      tags:
        - Attendance
      summary: Actualizar un registro de asistencia
      description: Modifica el campo `presente` de un registro de asistencia existente. Requiere autenticación.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID del registro de asistencia
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - presente
              properties:
                presente:
                  type: boolean
                  description: Nuevo valor de presencia
                  example: true
      responses:
        "200":
          description: Asistencia actualizada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Asistencia actualizada con éxito
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags:
        - Attendance
      summary: Eliminar un registro de asistencia
      description: Elimina un registro de asistencia por su ID. Requiere autenticación.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID del registro de asistencia a eliminar
      responses:
        "200":
          description: Registro de asistencia eliminado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Registro de asistencia con ID 3 eliminado correctamente
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

# CLASES

  /clases:
    get:
      tags:
        - Classes
      summary: Obtener clases
      description: >
        Retorna todas las clases de un curso, ordenadas por semana y fecha.
        Si no se especifica `id_curso`, se usa el curso con ID 1 por defecto.
      parameters:
        - in: query
          name: id_curso
          schema:
            type: integer
          description: ID del curso (default 1 si no se envía)
        - in: query
          name: fecha
          schema:
            type: string
            format: date
          description: Filtrar por fecha exacta (YYYY-MM-DD)
      responses:
        "200":
          description: Lista de clases obtenida correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      classes:
                        type: array
                        items:
                          $ref: "#/components/schemas/Class"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Classes
      summary: Crear una nueva clase
      description: Crea una clase dentro de un curso.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassCreate"
      responses:
        "201":
          description: Clase creada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Clase creada correctamente
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /clases/materia/{id_subject}:
    get:
      tags:
        - Classes
      summary: Obtener clases por materia
      description: >
        Retorna todas las clases de todos los cursos que pertenecen a una materia,
        ordenadas por semana y fecha ascendente.
      parameters:
        - in: path
          name: id_subject
          required: true
          schema:
            type: integer
          description: ID de la materia
      responses:
        "200":
          description: Clases de la materia obtenidas correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      classes:
                        type: array
                        items:
                          $ref: "#/components/schemas/Class"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /clases/{id_clase}:
    get:
      tags:
        - Classes
      summary: Obtener una clase por ID
      parameters:
        - in: path
          name: id_clase
          required: true
          schema:
            type: integer
          description: ID de la clase
      responses:
        "200":
          description: Clase encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      class:
                        $ref: "#/components/schemas/Class"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      tags:
        - Classes
      summary: Actualizar parcialmente una clase
      description: Actualiza uno o más campos permitidos de una clase.
      parameters:
        - in: path
          name: id_clase
          required: true
          schema:
            type: integer
          description: ID de la clase a actualizar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassPatch"
      responses:
        "200":
          description: Clase actualizada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Clase con ID 3 actualizada correctamente
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags:
        - Classes
      summary: Eliminar una clase
      description: Elimina una clase por su ID.
      parameters:
        - in: path
          name: id_clase
          required: true
          schema:
            type: integer
          description: ID de la clase a eliminar
      responses:
        "200":
          description: Clase eliminada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Clase con ID 3 eliminada correctamente
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

# CURSOS

  /courses:
    get:
      tags:
        - Courses
      summary: Obtener todos los cursos
      description: Retorna todos los cursos. Se puede filtrar por nombre de materia (parcial), cátedra (parcial) o año.
      parameters:
        - in: query
          name: materia
          schema:
            type: string
          description: Nombre parcial de la materia (búsqueda con LIKE)
        - in: query
          name: cuatrimestre
          schema:
            type: integer
          description: Número de cuatrimestre
        - in: query
          name: anio
          schema:
            type: integer
          description: Año del curso
      responses:
        "200":
          description: Lista de cursos obtenida correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      courses:
                        type: array
                        items:
                          $ref: "#/components/schemas/Course"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Courses
      summary: Crear un nuevo curso
      description: Crea un curso nuevo asociado a una materia.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseCreate"
      responses:
        "201":
          description: Curso creado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: curso creado correctamente
        "400":
          $ref: "#/components/responses/BadRequest"

  /courses/{id_course}:
    get:
      tags:
        - Courses
      summary: Obtener un curso por ID
      parameters:
        - in: path
          name: id_course
          required: true
          schema:
            type: integer
          description: ID del curso
      responses:
        "200":
          description: Curso encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      course:
                        $ref: "#/components/schemas/Course"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      tags:
        - Courses
      summary: Actualizar parcialmente un curso
      description: Actualiza uno o más campos de un curso existente. Ahora también permite actualizar `slack_url` y `youtube_url`.
      parameters:
        - in: path
          name: id_course
          required: true
          schema:
            type: integer
          description: ID del curso a actualizar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoursePatch"
      responses:
        "200":
          description: Curso actualizado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Curso actualizado con éxito
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags:
        - Courses
      summary: Eliminar un curso
      description: Elimina un curso por su ID. Requiere autenticación.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id_course
          required: true
          schema:
            type: integer
          description: ID del curso a eliminar
      responses:
        "200":
          description: Curso eliminado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Curso con ID 2 eliminado correctamente
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

# EVALUACIÓN

  /evaluaciones:
    get:
      tags:
        - Exams
      summary: Obtener todas las evaluaciones
      description: Retorna evaluaciones. Se puede filtrar por `id_curso`, `id_tipo`, `id_usuario` o `fecha`.
      parameters:
        - in: query
          name: id_curso
          schema:
            type: integer
          description: Filtrar por ID de curso
        - in: query
          name: id_tipo
          schema:
            type: integer
          description: Filtrar por tipo de evaluación
        - in: query
          name: id_usuario
          schema:
            type: integer
          description: Filtrar por ID del usuario creador
        - in: query
          name: fecha
          schema:
            type: string
            format: date
          description: Filtrar por fecha (YYYY-MM-DD)
      responses:
        "200":
          description: Lista de evaluaciones obtenida correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      evaluaciones:
                        type: array
                        items:
                          $ref: "#/components/schemas/Exam"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Exams
      summary: Crear una evaluación
      description: >
        Crea una evaluación. Si el `nombre` del tipo de evaluación no existe en la tabla
        `tipos_evaluacion`, se inserta automáticamente. El campo `id_usuario` es opcional;
        si se omite se usa el primer usuario de la base de datos como fallback.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExamCreate"
      responses:
        "201":
          description: Evaluación creada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Evaluacion creada con exito
        "400":
          $ref: "#/components/responses/BadRequest"

  /evaluaciones/{id}:
    get:
      tags:
        - Exams
      summary: Obtener una evaluación por ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID de la evaluación
      responses:
        "200":
          description: Evaluación encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      exams:
                        type: array
                        items:
                          $ref: "#/components/schemas/ExamDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      tags:
        - Exams
      summary: Actualizar parcialmente una evaluación
      description: Modifica `id_tipo`, `id_usuario` y/o `fecha` de una evaluación. Requiere autenticación.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID de la evaluación a actualizar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExamPatch"
      responses:
        "200":
          description: Evaluación actualizada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Evaluacion actualizada con exito
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags:
        - Exams
      summary: Eliminar una evaluación
      description: >
        Elimina una evaluación y todas las notas asociadas a ella (cascade manual).
        Requiere autenticación.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID de la evaluación a eliminar
      responses:
        "200":
          description: Evaluación eliminada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Evaluacion con ID 4 eliminada correctamente
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /notas/guardar:
    post:
      tags:
        - Exams
      summary: Guardar notas de una evaluación
      description: >
        Guarda o actualiza las notas de múltiples alumnos para una evaluación.
        Usa `INSERT ... ON DUPLICATE KEY UPDATE`, por lo que es idempotente.
        El campo `correctores` es opcional y permite asignar un nombre de corrector
        por alumno; si se omite, se usa `id_corrector` como fallback.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveNotes"
      responses:
        "200":
          description: Notas guardadas correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Notas guardadas con éxito
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /students_with_notes:
    get:
      tags:
        - Exams
      summary: Reporte de alumnos con notas
      description: >
        Retorna todos los alumnos de un curso junto con sus notas por evaluación,
        su equipo (si corresponde) y el nombre del corrector por nota.
        Soporta paginación y ordenamiento. Las notas se devuelven en campos `notas_raw`
        y `correctores_raw` con el formato `id_evaluacion:valor` separados por coma.
      parameters:
        - in: query
          name: id_curso
          required: true
          schema:
            type: integer
          description: ID del curso
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Número de página (default 1)
        - in: query
          name: per_page
          schema:
            type: integer
          description: Resultados por página. Si se omite, se devuelven todos.
        - in: query
          name: order_by
          schema:
            type: string
            enum: [nombre, apellido, padron]
          description: Campo por el cual ordenar
        - in: query
          name: order
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: Dirección del ordenamiento
      responses:
        "200":
          description: Reporte obtenido correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/StudentNotesReport"
                      total:
                        type: integer
                        description: Total de alumnos en el curso (sin paginación)
                        example: 45
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

