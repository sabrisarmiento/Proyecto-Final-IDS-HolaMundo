        "500":
          $ref: "#/components/responses/InternalServerError"

# USUARIOS

  /users:
    get:
      tags:
        - Users
      summary: Obtener usuarios
      description: >
        Retorna usuarios del sistema. Se puede filtrar por `id_usuario`, `nombre`,
        `apellido`, `correo`, `created_at` o `id_rol`. No requiere autenticación.
      parameters:
        - in: query
          name: id_usuario
          schema:
            type: integer
          description: Filtrar por ID de usuario
        - in: query
          name: nombre
          schema:
            type: string
          description: Filtrar por nombre exacto
        - in: query
          name: apellido
          schema:
            type: string
          description: Filtrar por apellido exacto
        - in: query
          name: correo
          schema:
            type: string
          description: Filtrar por correo exacto
        - in: query
          name: created_at
          schema:
            type: string
            format: date
          description: Filtrar por fecha de creación (YYYY-MM-DD)
        - in: query
          name: id_rol
          schema:
            type: integer
          description: Filtrar por ID de rol
      responses:
        "200":
          description: Lista de usuarios obtenida correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      users:
                        type: array
                        items:
                          $ref: "#/components/schemas/User"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Users
      summary: Crear un usuario
      description: >
        Crea un nuevo usuario. La contraseña se almacena hasheada (Werkzeug).
        Devuelve 409 si el correo ya está registrado. Requiere autenticación.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"
      responses:
        "201":
          description: Usuario creado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: usuario creado correctamente
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /users/{id_user}:
    get:
      tags:
        - Users
      summary: Obtener un usuario por ID
      description: No requiere autenticación.
      parameters:
        - in: path
          name: id_user
          required: true
          schema:
            type: integer
          description: ID del usuario
      responses:
        "200":
          description: Usuario encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      user:
                        type: array
                        items:
                          $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      tags:
        - Users
      summary: Actualizar parcialmente un usuario
      description: >
        Modifica uno o más campos de un usuario. Si se envía `contraseña`,
        se almacena en texto plano (sin hashear en el PATCH actual — revisar).
        Requiere autenticación.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id_user
          required: true
          schema:
            type: integer
          description: ID del usuario a actualizar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPatch"
      responses:
        "200":
          description: Usuario actualizado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Usuario actualizado con exito
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags:
        - Users
      summary: Eliminar un usuario
      description: Elimina un usuario por su ID. Requiere autenticación.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id_user
          required: true
          schema:
            type: integer
          description: ID del usuario a eliminar
      responses:
        "200":
          description: Usuario eliminado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Usuario con ID 5 eliminado correctamente
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /cursos/{id_curso}/promocion:
    get:
      tags:
        - Exams
      summary: Obtener configuración de promoción de un curso
      description: >
        Retorna si el curso es promocionable y la configuración de cada evaluación
        (si cuenta para promoción y la nota mínima requerida).
      parameters:
        - in: path
          name: id_curso
          required: true
          schema:
            type: integer
          description: ID del curso
      responses:
        "200":
          description: Configuración de promoción obtenida correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      config:
                        $ref: "#/components/schemas/PromocionConfig"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Exams
      summary: Guardar configuración de promoción de un curso
      description: >
        Guarda o actualiza la configuración de promoción del curso y de cada evaluación.
        Usa `INSERT ... ON DUPLICATE KEY UPDATE`, por lo que es idempotente.
      parameters:
        - in: path
          name: id_curso
          required: true
          schema:
            type: integer
          description: ID del curso
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromocionConfigInput"
      responses:
        "200":
          description: Configuración de promoción guardada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Configuración de promoción guardada correctamente
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

