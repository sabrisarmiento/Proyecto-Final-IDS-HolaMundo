          type: integer
          example: 7
        id_evaluacion:
          type: integer
          example: 1
        id_equipo:
          type: integer
          example: 3
        nota:
          type: number
          format: float
          example: 9.0
        id_corrector:
          type: integer
          example: 10

    Material:
      type: object
      properties:
