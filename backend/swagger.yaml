          type: integer
          example: 12
        padron:
          type: integer
          description: Padrón del alumno a agregar
          example: 108234
        forzar:
          type: boolean
          description: >
            Si es `true` y el alumno ya pertenece a otro equipo, se lo remueve del anterior
            y se lo agrega al nuevo. Si es `false` (default) devuelve 409.
          default: false
          example: false

    TeamStudentRemove:
      type: object
      required:
        - id_equipo
        - id_alumno
      properties:
        id_equipo:
          type: integer
          example: 12
        id_alumno:
          type: integer
          example: 7

    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        code:
          type: integer
          example: 404
        message:
          type: string
          example: Not Found
        description:
          type: string
          example: No existe un aviso con ID 99

  responses:
    BadRequest:
      description: Solicitud inválida o campos faltantes
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            code: 400
            message: Bad Request
            description: Los campos 'id_alumno' e 'id_clase' son obligatorios

    Unauthorized:
      description: Token de autenticación ausente o inválido
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            code: 401
            message: Unauthorized
            description: Token inválido o expirado

    Forbidden:
      description: Acceso denegado (alumno inactivo o fuera del rango GPS)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            code: 403
            message: Forbidden
            description: Ubicación fuera del rango permitido

    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            code: 404
            message: Not Found
            description: No existe un aviso con ID 99

    Conflict:
      description: El recurso ya existe (conflicto de duplicado)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            code: 409
            message: Conflict
            description: El rol ya existe

    InternalServerError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            code: 500
            message: Internal Server Error
            description: Unexpected error