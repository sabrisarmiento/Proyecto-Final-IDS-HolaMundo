            type: integer
          description: Filtrar por ID de alumno
        - in: query
          name: id_curso
          schema:
            type: integer
          description: Filtrar por ID de curso
      responses:
        "200":
          description: Lista de equipos obtenida correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      teams:
                        type: array
                        items:
                          $ref: "#/components/schemas/Team"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Teams
      summary: Crear un equipo
      description: Crea un nuevo equipo dentro de un curso.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamCreate"
      responses:
        "201":
          description: Equipo creado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id_equipo:
                        type: integer
                        example: 12
        "500":
          $ref: "#/components/responses/InternalServerError"

  /equipos/{id_team}:
    get:
      tags:
        - Teams
      summary: Obtener un equipo por ID
      description: Retorna el equipo con sus alumnos embebidos.
      parameters:
        - in: path
          name: id_team
          required: true
          schema:
            type: integer
          description: ID del equipo
      responses:
        "200":
          description: Equipo encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      team:
                        $ref: "#/components/schemas/Team"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      tags:
        - Teams
      summary: Actualizar un equipo
      description: Modifica `nombre_equipo` y/o `id_curso` de un equipo.
      parameters:
        - in: path
          name: id_team
          required: true
          schema:
            type: integer
          description: ID del equipo a actualizar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamPatch"
      responses:
        "200":
          description: Equipo actualizado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Equipo actualizado correctamente
        "400":
          $ref: "#/components/responses/BadRequest"

    delete:
      tags:
        - Teams
      summary: Eliminar un equipo
      description: Elimina un equipo por su ID.
      parameters:
        - in: path
          name: id_team
          required: true
          schema:
            type: integer
          description: ID del equipo a eliminar
      responses:
        "200":
          description: Equipo eliminado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
