      tags:
        - TeamStudents
      summary: Agregar alumno a un equipo
      description: >
        Agrega un alumno a un equipo buscándolo por su `padron`.
        Si el alumno ya pertenece a otro equipo, devuelve 409 a menos que se envíe
        `forzar: true`, en cuyo caso se lo remueve del equipo anterior y se lo agrega al nuevo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamStudentAdd"
      responses:
        "200":
          description: Alumno agregado al equipo correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Alumno agregado al equipo
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags:
        - TeamStudents
      summary: Remover alumno de un equipo
      description: Elimina la relación entre un alumno y un equipo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamStudentRemove"
      responses:
        "200":
          description: Alumno removido del equipo correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Alumno removido del equipo
        "500":
          $ref: "#/components/responses/InternalServerError"

# REPORTES

  /reportes/alumnos:
    get:
      tags:
        - Reports
      summary: Reporte de alumnos en PDF
      description: Genera y descarga un PDF con el listado de alumnos de un curso (padrón, nombre, apellido, correo, estado).
      parameters:
        - in: query
          name: curso_id
          required: true
          schema:
            type: integer
          description: ID del curso
      responses:
        "200":
          description: PDF generado correctamente
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /reportes/equipos:
    get:
      tags:
        - Reports
      summary: Reporte de equipos en PDF
      description: Genera y descarga un PDF con los equipos del curso y los alumnos que los integran.
      parameters:
        - in: query
          name: curso_id
          required: true
          schema:
            type: integer
          description: ID del curso
      responses:
        "200":
          description: PDF generado correctamente
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /reportes/notas:
    get:
      tags:
        - Reports
      summary: Reporte de notas en PDF
      description: >
        Genera y descarga un PDF con las notas de los alumnos del curso.
        Se puede filtrar por evaluaciones específicas pasando el parámetro
        `evaluaciones[]` (o `evaluaciones`) una o más veces.
        Si se omite, se incluyen todas las evaluaciones.
      parameters:
        - in: query
          name: curso_id
          required: true
          schema:
            type: integer
          description: ID del curso
        - in: query
          name: evaluaciones[]
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          description: Nombres de evaluaciones a incluir (ej. `evaluaciones[]=Parcial 1&evaluaciones[]=TP Final`)
      responses:
        "200":
          description: PDF generado correctamente
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /reportes/exportar:
    get:
      tags:
        - Reports
      summary: Reporte combinado en PDF
      description: >
        Genera un único PDF con las secciones seleccionadas: alumnos, notas y/o equipos.
        Al menos una sección debe estar activada. Las evaluaciones solo aplican cuando `notas=true`.
        Los valores truthy aceptados para los flags son: `1`, `true`, `True`, `on`, `yes`.
      parameters:
        - in: query
          name: curso_id
          required: true
          schema:
            type: integer
          description: ID del curso
        - in: query
          name: alumnos
          schema:
            type: string
          description: Incluir sección de alumnos (`true` / `1`)
        - in: query
          name: equipos
          schema:
            type: string
          description: Incluir sección de equipos (`true` / `1`)
        - in: query
          name: notas
          schema:
            type: string
          description: Incluir sección de notas (`true` / `1`)
        - in: query
          name: evaluaciones[]
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          description: Filtro de evaluaciones para la sección de notas (opcional)
      responses:
        "200":
          description: PDF combinado generado correctamente
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

# COMPONENTES

components:

  securitySchemes:
    bearerAuth:
