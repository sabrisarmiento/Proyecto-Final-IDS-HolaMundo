        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /subjects/{subject_id}:
    get:
      tags:
        - Subjects
      summary: Obtener una materia por ID
      parameters:
        - in: path
          name: subject_id
          required: true
          schema:
            type: integer
          description: ID de la materia (debe ser > 0)
      responses:
        "200":
          description: Materia encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      subject:
                        $ref: "#/components/schemas/Subject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      tags:
        - Subjects
      summary: Actualizar parcialmente una materia
      description: >
        Modifica `nombre` y/o `codigo` de una materia. Si se cambia el `codigo`,
        valida que no exista otra materia con ese código (devuelve 409 si colisiona).
      parameters:
        - in: path
          name: subject_id
          required: true
          schema:
            type: integer
          description: ID de la materia a actualizar (debe ser > 0)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubjectPatch"
      responses:
        "200":
          description: Materia actualizada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Materia actualizada correctamente
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

