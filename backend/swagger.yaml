      responses:
        "200":
          description: Lista de materias obtenida correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      subjects:
                        type: array
                        items:
                          $ref: "#/components/schemas/Subject"
