        descripcion:
          type: string
          example: Ejercicios de práctica sobre recursión y backtracking
        url_externo:
          type: string
          example: https://drive.google.com/file/d/abc123
        id_curso:
          type: integer
          example: 1

    Role:
      type: object
      properties:
        id_rol:
          type: integer
          example: 2
        nombre:
          type: string
          example: Docente
        nivel_administracion:
          type: integer
          minimum: 1
          maximum: 3
          example: 2

    RoleCreate:
      type: object
      required:
        - nombre
        - nivel_administracion
      properties:
        nombre:
          type: string
          example: Ayudante
        nivel_administracion:
          type: integer
          minimum: 1
          maximum: 3
          example: 1

    Team:
      type: object
      properties:
        id_equipo:
          type: integer
          example: 12
        nombre_equipo:
          type: string
          example: Grupo Alpha
        id_curso:
          type: integer
          example: 1

    TeamCreate:
      type: object
      required:
        - nombre_equipo
        - id_curso
      properties:
        nombre_equipo:
          type: string
          example: Grupo Alpha
        id_curso:
          type: integer
          example: 1

    TeamPatch:
      type: object
      description: Al menos uno de los campos debe estar presente.
      properties:
        nombre_equipo:
          type: string
          example: Grupo Beta
        id_curso:
          type: integer
          example: 2

    User:
      type: object
      properties:
        id_usuario:
          type: integer
          example: 5
        nombre:
          type: string
          example: Carlos
        apellido:
          type: string
          example: Rodríguez
        correo:
          type: string
          example: crodriguez@fi.uba.ar
        contraseña:
          type: string
          description: Hash de la contraseña (Werkzeug)
          example: pbkdf2:sha256:600000$...
        creado:
          type: string
          format: date-time
          example: "2026-03-01T10:00:00Z"
        id_rol:
          type: integer
          example: 2

    UserCreate:
      type: object
      required:
        - nombre
        - apellido
        - correo
        - contraseña
        - id_rol
      properties:
        nombre:
          type: string
          example: Carlos
        apellido:
          type: string
          example: Rodríguez
        correo:
          type: string
          example: crodriguez@fi.uba.ar
        contraseña:
          type: string
          description: Contraseña en texto plano. Se hashea automáticamente antes de almacenarse.
          example: MiPassword123
        id_rol:
          type: integer
          example: 2

    UserPatch:
      type: object
      description: Al menos uno de los campos debe estar presente.
      properties:
        nombre:
          type: string
          example: Carlos
        apellido:
          type: string
          example: Rodríguez
        correo:
          type: string
          example: nuevo@fi.uba.ar
        contraseña:
          type: string
          description: >
            Contraseña nueva en texto plano. Atención: el PATCH actual NO hashea
            la contraseña antes de guardarla, a diferencia del POST.
          example: NuevoPassword456
        id_rol:
          type: integer
          example: 3

    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        code:
          type: integer
          example: 404
        message:
          type: string
          example: Not Found
        description:
          type: string
          example: No existe un aviso con ID 99

  responses:
    BadRequest:
      description: Solicitud inválida o campos faltantes
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            code: 400
            message: Bad Request
            description: Los campos 'id_alumno' e 'id_clase' son obligatorios

    Unauthorized:
      description: Token de autenticación ausente o inválido
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            code: 401
            message: Unauthorized
            description: Token inválido o expirado

    Forbidden:
      description: Acceso denegado (alumno inactivo o fuera del rango GPS)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            code: 403
            message: Forbidden
            description: Ubicación fuera del rango permitido

    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            code: 404
            message: Not Found
            description: No existe un aviso con ID 99

    Conflict:
      description: El recurso ya existe (conflicto de duplicado)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            code: 409
            message: Conflict
            description: El rol ya existe

    InternalServerError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            code: 500
            message: Internal Server Error
            description: Unexpected error