          name: subject_id
          required: true
          schema:
            type: integer
          description: ID de la materia (debe ser > 0)
      responses:
        "200":
          description: Materia encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      subject:
                        $ref: "#/components/schemas/Subject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

# EQUIPOS

  /equipos:
    get:
      tags:
        - Teams
      summary: Obtener equipos
      description: >
        Retorna todos los equipos. Se puede filtrar por curso y/o por alumno.
        Si se filtra por `id_alumno` se hace un JOIN con la tabla `equipo_alumno`.
        Requiere autenticación.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: id_alumno
          schema:
            type: integer
          description: Filtrar por ID de alumno (trae solo los equipos donde participa ese alumno)
        - in: query
          name: id_curso
          schema:
            type: integer
          description: Filtrar por ID de curso
      responses:
        "200":
          description: Lista de equipos obtenida correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      teams:
                        type: array
                        items:
                          $ref: "#/components/schemas/Team"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Teams
      summary: Crear un equipo
      description: Crea un nuevo equipo dentro de un curso. Requiere autenticación.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamCreate"
      responses:
        "201":
          description: Equipo creado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id_equipo:
                        type: integer
                        example: 12
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /equipos/{id_team}:
    get:
      tags:
        - Teams
      summary: Obtener un equipo por ID
      description: Requiere autenticación.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id_team
          required: true
          schema:
            type: integer
          description: ID del equipo
      responses:
        "200":
          description: Equipo encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      team:
                        type: array
                        items:
                          $ref: "#/components/schemas/Team"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      tags:
        - Teams
      summary: Actualizar un equipo
      description: Modifica `nombre_equipo` y/o `id_curso` de un equipo. Requiere autenticación.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id_team
          required: true
          schema:
            type: integer
          description: ID del equipo a actualizar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamPatch"
      responses:
        "200":
          description: Equipo actualizado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Equipo actualizado correctamente
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

    delete:
      tags:
        - Teams
      summary: Eliminar un equipo
      description: Elimina un equipo por su ID. Requiere autenticación.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id_team
          required: true
          schema:
            type: integer
          description: ID del equipo a eliminar
      responses:
        "200":
          description: Equipo eliminado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Equipo con ID 12 eliminado correctamente
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

# USUARIOS

  /users:
    get:
      tags:
        - Users
      summary: Obtener usuarios
      description: >
        Retorna usuarios del sistema. Se puede filtrar por `id_usuario`, `nombre`,
        `apellido`, `correo`, `created_at` o `id_rol`. No requiere autenticación.
      parameters:
        - in: query
          name: id_usuario
          schema:
            type: integer
          description: Filtrar por ID de usuario
        - in: query
          name: nombre
          schema:
            type: string
          description: Filtrar por nombre exacto
        - in: query
          name: apellido
          schema:
            type: string
          description: Filtrar por apellido exacto
        - in: query
          name: correo
          schema:
            type: string
          description: Filtrar por correo exacto
        - in: query
          name: created_at
          schema:
            type: string
            format: date
          description: Filtrar por fecha de creación (YYYY-MM-DD)
        - in: query
          name: id_rol
          schema:
            type: integer
          description: Filtrar por ID de rol
      responses:
        "200":
          description: Lista de usuarios obtenida correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      users:
                        type: array
                        items:
                          $ref: "#/components/schemas/User"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Users
      summary: Crear un usuario
      description: >
        Crea un nuevo usuario. La contraseña se almacena hasheada (Werkzeug).
        Devuelve 409 si el correo ya está registrado. Requiere autenticación.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"
      responses:
        "201":
          description: Usuario creado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: usuario creado correctamente
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /users/{id_user}:
    get:
      tags:
        - Users
      summary: Obtener un usuario por ID
      description: No requiere autenticación.
      parameters:
        - in: path
          name: id_user
          required: true
          schema:
            type: integer
          description: ID del usuario
      responses:
        "200":
          description: Usuario encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      user:
                        type: array
                        items:
                          $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      tags:
        - Users
      summary: Actualizar parcialmente un usuario
      description: >
        Modifica uno o más campos de un usuario. Si se envía `contraseña`,
        se almacena en texto plano (sin hashear en el PATCH actual — revisar).
        Requiere autenticación.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id_user
          required: true
          schema:
            type: integer
          description: ID del usuario a actualizar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPatch"
      responses:
        "200":
          description: Usuario actualizado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Usuario actualizado con exito
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags:
        - Users
      summary: Eliminar un usuario
      description: Elimina un usuario por su ID. Requiere autenticación.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id_user
          required: true
          schema:
            type: integer
          description: ID del usuario a eliminar
      responses:
        "200":
          description: Usuario eliminado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Usuario con ID 5 eliminado correctamente
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

# COMPONENTES

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    Advertisement:
      type: object
      properties:
        id_aviso:
          type: integer
          example: 1
        id_usuario:
          type: integer
          example: 10
        id_curso:
          type: integer
          example: 3
        titulo:
          type: string
          example: Recordatorio de examen
        mensaje:
          type: string
          example: El examen parcial es el viernes a las 18hs.
        fecha:
          type: string
          format: date
          example: "2026-06-10"
        emisor:
          type: string
          example: Juan Pérez

    AdvertisementCreate:
      type: object
      required:
        - id_usuario
        - id_curso
        - titulo
        - mensaje
      properties:
        id_usuario:
          type: integer
          example: 10
        id_curso:
          type: integer
          example: 3
        titulo:
          type: string
          example: Recordatorio de examen
        mensaje:
          type: string
          example: El examen parcial es el viernes a las 18hs.

    AdvertisementPatch:
      type: object
      description: Al menos un campo debe estar presente.
      properties:
        id_usuario:
          type: integer
          example: 10
        titulo:
          type: string
          example: Nuevo título
        mensaje:
          type: string
          example: Mensaje actualizado.
        fecha:
          type: string
          format: date
          example: "2026-06-15"

    Attendance:
      type: object
      properties:
        id_asistencia:
          type: integer
          example: 42
        id_alumno:
          type: integer
          example: 7
        id_clase:
          type: integer
          example: 5
        presente:
          type: boolean
          example: true

    AttendanceCreate:
      type: object
      required:
        - id_alumno
        - id_clase
        - latitud
        - longitud
      properties:
        id_alumno:
          type: integer
          example: 7
        id_clase:
          type: integer
          example: 5
        latitud:
          type: number
          format: float
          description: Latitud GPS del alumno al momento de registrar asistencia
          example: -34.6177
        longitud:
          type: number
          format: float
          description: Longitud GPS del alumno al momento de registrar asistencia
          example: -58.3682
        presente:
          type: boolean
          default: true
          example: true

    Class:
      type: object
      properties:
        id_clase:
          type: integer
          example: 12
        fecha:
          type: string
          format: date
          example: "2026-04-15"
        temas:
          type: string
          example: Introducción a punteros y memoria dinámica
        tipo:
          type: string
          example: Teórica
        modalidad:
          type: string
          example: Presencial
        semana:
          type: integer
          example: 3
        id_curso:
          type: integer
          example: 1

    ClassCreate:
      type: object
      required:
        - fecha
        - semana
        - id_curso
      properties:
        fecha:
          type: string
          format: date
          example: "2026-04-15"
        temas:
          type: string
          example: Introducción a punteros y memoria dinámica
        semana:
          type: integer
          example: 3
        tipo:
          type: string
          example: Teórica
        modalidad:
          type: string
          example: Presencial
        id_curso:
          type: integer
          example: 1

    ClassPatch:
      type: object
      description: Al menos uno de los campos permitidos debe estar presente.
      properties:
        fecha:
          type: string
          format: date
          example: "2026-04-20"
        temas:
          type: string
          example: Recursión y backtracking
        semana:
          type: integer
          example: 4
        tipo:
          type: string
          example: Práctica
        modalidad:
          type: string
          example: Virtual
        id_curso:
          type: integer
          example: 2

    Course:
      type: object
      properties:
        id_curso:
          type: integer
          example: 2
        materia:
          type: string
          example: Introducción al Desarrollo de Software
        catedra:
          type: string
          example: Cátedra Medina
        cuatrimestre:
          type: integer
          example: 1
        anio:
          type: integer
          example: 2026
        slack_url:
          type: string
          example: https://app.slack.com/client/T000/C000
        youtube_url:
          type: string
          example: https://www.youtube.com/@IntroDsSfiuba

    CourseCreate:
      type: object
      required:
        - id_materia
        - catedra
        - cuatrimestre
        - anio
        - id_profesor
      properties:
        id_materia:
          type: integer
          example: 5
        catedra:
          type: string
          example: Cátedra Medina
        cuatrimestre:
          type: integer
          example: 1
        anio:
          type: integer
          example: 2026
        id_profesor:
          type: integer
          example: 3

    CoursePatch:
      type: object
      description: Al menos uno de los campos debe estar presente.
      properties:
        id_materia:
          type: integer
          example: 5
        catedra:
          type: string
          example: Cátedra Pérez
        cuatrimestre:
          type: integer
          example: 2
        anio:
          type: integer
          example: 2026
        id_profesor:
          type: integer
          example: 7

    Exam:
      type: object
      properties:
        id_evaluacion:
          type: integer
          example: 1
        id_tipo:
          type: integer
          example: 2
        id_curso:
          type: integer
          example: 1
        id_usuario:
          type: integer
          example: 10
        fecha:
          type: string
          format: date
          example: "2026-05-20"
        nombre:
          type: string
          description: Nombre del tipo de evaluación (join con tipos_evaluacion)
          example: Parcial 1

    ExamDetail:
      type: object
      properties:
        id_tipo:
          type: integer
          example: 2
        id_usuario:
          type: integer
          example: 10
        fecha:
          type: string
          format: date
          example: "2026-05-20"

    ExamCreate:
      type: object
      required:
        - nombre
        - id_curso
      properties:
        nombre:
          type: string
          description: Nombre del tipo de evaluación. Se crea automáticamente si no existe.
          example: Parcial 1
        id_curso:
          type: integer
          example: 1
        id_usuario:
          type: integer
          description: ID del usuario que crea la evaluación. Si se omite, se usa el primer usuario disponible.
          example: 10
        fecha:
          type: string
          format: date
          example: "2026-05-20"
        asociacion:
          type: string
          description: Indica si la evaluación es individual o grupal.
          enum: [Individual, Grupal]
          default: Individual
          example: Individual

    ExamPatch:
      type: object
      description: Al menos uno de los campos debe estar presente.
      properties:
        id_tipo:
          type: integer
          example: 3
        id_usuario:
          type: integer
          example: 10
        fecha:
          type: string
          format: date
          example: "2026-06-01"

    SaveNotes:
      type: object
      required:
        - id_evaluacion
        - notas
      properties:
        id_evaluacion:
          type: integer
          example: 1
        notas:
          type: object
          description: Mapa de `id_alumno` (como string) → nota numérica
          additionalProperties:
            type: number
          example:
            "7": 8.5
            "12": 6.0
            "23": 9.0
        correctores:
          type: object
          description: Mapa opcional de `id_alumno` (como string) → nombre libre del corrector
          additionalProperties:
            type: string
          example:
            "7": "Prof. García"
            "12": "Prof. López"

    StudentNotesReport:
      type: object
      properties:
        id_alumno:
          type: integer
          example: 7
        nombre:
          type: string
          example: María
        apellido:
          type: string
          example: González
        padron:
          type: string
          example: "107345"
        estado_alumno:
          type: boolean
          example: true
        equipo:
          type: string
          nullable: true
          example: Equipo Alpha
        notas_raw:
          type: string
          description: Notas en formato `id_evaluacion:nota` separadas por coma
          example: "1:8.5,2:7.0,3:9.0"
        correctores_raw:
          type: string
          description: Correctores en formato `id_evaluacion:nombre` separadas por coma
          example: "1:Prof. García,2:,3:Prof. López"

    Student:
      type: object
      properties:
        id_alumno:
          type: integer
          example: 42
        nombre:
          type: string
          example: Laura
        apellido:
          type: string
          example: Fernández
        padron:
          type: string
          example: "108234"
        correo:
          type: string
          example: lfernandez@fi.uba.ar
        id_curso:
          type: integer
          example: 1
        estado_alumno:
          type: boolean
          example: true

    StudentCreate:
      type: object
      required:
        - nombre
        - apellido
        - padron
        - correo
        - id_curso
      properties:
        nombre:
          type: string
          example: Laura
        apellido:
          type: string
          example: Fernández
        padron:
          type: string
          example: "108234"
        correo:
          type: string
          example: lfernandez@fi.uba.ar
        id_curso:
          type: integer
          example: 1

    ImportResult:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: object
          properties:
            creados:
              type: integer
              example: 28
            errores:
              type: integer
              example: 2
            detalle_creados:
              type: array
              items:
                type: object
                properties:
                  fila:
                    type: integer
                    example: 3
                  id:
                    type: integer
                    example: 43
            detalle_errores:
              type: array
              items:
                type: object
                properties:
                  fila:
                    type: integer
                    example: 7
                  status:
                    type: integer
                    example: 409
                  error:
                    type: string
                    example: El alumno ya existe (correo o padrón duplicado)

    Subject:
      type: object
      properties:
        id_materia:
          type: integer
          example: 3
        nombre:
          type: string
          example: Introducción al Desarrollo de Software
        codigo:
          type: string
          example: "75.40"

    SubjectCreate:
      type: object
      required:
        - nombre
        - codigo
      properties:
        nombre:
          type: string
          example: Algoritmos y Programación I
        codigo:
          type: string
          example: "75.41"

    ExamType:
      type: object
      properties:
        id_tipo:
          type: integer
          example: 2
        nombre:
          type: string
