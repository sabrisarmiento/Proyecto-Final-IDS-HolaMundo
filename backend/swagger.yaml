# EQUIPOS

  /equipos:
    get:
      tags:
        - Teams
      summary: Obtener equipos
      description: >
        Retorna todos los equipos con sus alumnos embebidos. Se puede filtrar por curso y/o por alumno.
        Si se filtra por `id_alumno` se traen solo los equipos donde ese alumno participa.
      parameters:
        - in: query
          name: id_alumno
