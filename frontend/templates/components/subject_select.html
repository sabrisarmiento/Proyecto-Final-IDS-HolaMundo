<div class="subject-select-container">
  <select title="subject-select" id="subject-select" onchange="changeSubject(this.value)">
    <option value="general" {% if not selected_subject %}selected{% endif %}>
      {{ select_placeholder | default("General") }}
    </option>
    {% for s in subjects %}
      <option value="{{ s.id_materia }}"
        {% if s.id_materia == selected_subject %}selected{% endif %}>
        {{ s.nombre }}
      </option>
    {% endfor %}
  </select>
</div>
