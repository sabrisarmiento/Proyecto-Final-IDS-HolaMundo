{% macro pagination(page, total_pages, base_url) %}
{% if total_pages > 1 %}
  <nav class="pagination">
    {% if page > 1 %}
      <a href="{{ base_url }}&page={{ page - 1 }}" class="page-btn">← Anterior</a>
    {% endif %}

    {% for p in range(1, total_pages + 1) %}
      <a href="{{ base_url }}&page={{ p }}" class="page-btn {% if p == page %}page-active{% endif %}">
        {{ p }}
      </a>
    {% endfor %}

    {% if page < total_pages %}
      <a href="{{ base_url }}&page={{ page + 1 }}" class="page-btn">Siguiente →</a>
    {% endif %}
  </nav>
{% endif %}
{% endmacro %}
