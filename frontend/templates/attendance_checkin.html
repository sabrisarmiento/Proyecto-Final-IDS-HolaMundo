<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia — Panel FIUBA</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/button.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/attendance_checkin.css') }}">
</head>
<body>
<main class="checkin">
    <h1>Marcar asistencia</h1>
    <p>Necesitamos tu ubicación para validar que estás en la facultad.</p>
    <button id="btn" class="btn-action">Dar el presente</button>
    <div id="result"></div>
</main>

<script>
    const payload = {
    id_alumno: "{{ id_alumno }}",
    id_clase:  "{{ id_clase }}",
    code:      "{{ code }}"
    };
    const btn = document.getElementById('btn');
    const out = document.getElementById('result');

    btn.addEventListener('click', () => {
    if (!navigator.geolocation) {
        out.className = 'err';
        out.textContent = 'Tu navegador no soporta geolocalización.';
        return;
    }
    btn.disabled = true;
    out.className = '';
    out.textContent = 'Obteniendo ubicación…';

    navigator.geolocation.getCurrentPosition(async (pos) => {
        try {
        const resp = await fetch('/presente/marcar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
            ...payload,
            latitud: pos.coords.latitude,
            longitud: pos.coords.longitude
            })
        });
        const data = await resp.json();
        if (resp.ok) {
            out.className = 'ok';
            out.textContent = '✅ ' + (data.message || 'Asistencia registrada');
        } else {
            const desc = (data.errors && data.errors[0] && data.errors[0].description) || 'No se pudo registrar';
            out.className = 'err';
            out.textContent = '❌ ' + desc;
            btn.disabled = false;
        }
        } catch (e) {
        out.className = 'err';
        out.textContent = '❌ Error de red.';
        btn.disabled = false;
        }
    }, () => {
        out.className = 'err';
        out.textContent = '❌ Tenés que permitir la ubicación para marcar asistencia.';
        btn.disabled = false;
    });
    });
</script>
</body>
</html>
